services:
  postgres:
    image: postgres:16-alpine
    container_name: makkays-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-db
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: makkays-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: makkays-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Not started by default (LLM_PROVIDER=grok for the MVP). Start it explicitly with
  # `docker compose --profile ollama up -d` once you're ready to switch to local Ollama.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: makkays-chatbot-backend
    # Load all secrets and settings from your .env file
    env_file: .env
    environment:
      # Override service URLs to use docker-network hostnames instead of .env values
      - SUPABASE_DB_URL=postgresql+asyncpg://postgres:secret-db@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=local
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:create_app --host 0.0.0.0 --port 8000 --factory"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
