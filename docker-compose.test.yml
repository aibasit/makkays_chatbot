version: '3.8'

services:
  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret-db
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SUPABASE_DB_URL=postgresql+asyncpg://postgres:secret-db@test-postgres:5432/postgres
      - REDIS_URL=redis://test-redis:6379/0
      - DEFAULT_TENANT_ID=00000000-0000-0000-0000-000000000001
      - QDRANT_URL=https://qdrant.example.com
      - QDRANT_API_KEY=mock-key
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - OLLAMA_TIMEOUT_SECONDS=30
      - EMBEDDING_MODEL=BAAI/bge-m3
      - RESEND_API_KEY=mock-key
      - RESEND_FROM_EMAIL=mock@example.com
      - CRM_API_BASE_URL=http://mock-crm
      - CRM_API_KEY=mock-key
      - SITE_API_KEY=mock-key
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
